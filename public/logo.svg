<svg viewBox="0 0 150 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Wide soft aura behind the heart -->
    <radialGradient id="sf-heart-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF2E47" stop-opacity="0.6"/>
      <stop offset="45%"  stop-color="#FF2E47" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF2E47" stop-opacity="0"/>
    </radialGradient>
    <!-- Tight bloom on the heart edges -->
    <filter id="sf-heart-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Heart aura halo (luminous outer glow) -->
  <circle cx="110" cy="55" r="40" fill="url(#sf-heart-aura)"/>

  <!-- Hanger -->
  <g stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hook + stem: stem extends slightly past the shoulder junction (the "drop tip" -->
    <!-- characteristic of a real hanger). Clean "?" arc at the top, no extra curls.   -->
    <path d="M 40 58 L 40 28 C 40 23 44 20 50 20 C 58 20 62 23 62 28 L 62 36 C 62 39 60 39 58 37"/>
    <!-- Left shoulder (branches from 40,52 — 6px above stem end) -->
    <path d="M 40 52 L 12 85"/>
    <!-- Right shoulder -->
    <path d="M 40 52 L 72 85"/>
    <!-- Crossbar -->
    <path d="M 12 85 L 72 85"/>
  </g>

  <!-- Heart with bloom -->
  <path
    d="M 110 47 C 106 40 95 40 95 52 C 95 62 102 69 110 75 C 118 69 125 62 125 52 C 125 40 114 40 110 47 Z"
    fill="#FF2E47"
    filter="url(#sf-heart-bloom)"
  />
</svg>

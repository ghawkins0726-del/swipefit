<svg viewBox="0 0 120 92" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="sf-heart-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF2E47" stop-opacity="0.85"/>
      <stop offset="44%"  stop-color="#FF2E47" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FF2E47" stop-opacity="0"/>
    </radialGradient>
    <filter id="sf-heart-bloom" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.5" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Heart aura -->
  <circle cx="84" cy="46" r="26" fill="url(#sf-heart-aura)"/>

  <!-- Hanger: junction (30,50), shoulders x=8–52 (44px), hook loop above -->
  <g stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 30 50 L 30 28 C 30 19 38 13 46 15 C 54 17 57 25 54 31 C 51 37 46 37 44 34"/>
    <path d="M 30 50 L 8 78"/>
    <path d="M 30 50 L 52 78"/>
    <path d="M 8 78 L 52 78"/>
  </g>

  <!-- Heart: center (84,46), width 44px = hanger shoulder span -->
  <path
    d="M 84 38 C 81 31 62 31 62 44 C 62 55 84 64 84 64 C 84 64 106 55 106 44 C 106 31 87 31 84 38 Z"
    fill="#FF2E47"
    filter="url(#sf-heart-bloom)"
  />
</svg>

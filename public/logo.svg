<svg viewBox="0 0 130 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Wide soft aura behind the heart -->
    <radialGradient id="sf-heart-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF2E47" stop-opacity="0.6"/>
      <stop offset="45%"  stop-color="#FF2E47" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF2E47" stop-opacity="0"/>
    </radialGradient>
    <!-- Tight bloom on the heart edges -->
    <filter id="sf-heart-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Heart aura halo (sits behind, gives the luminous outer glow) -->
  <circle cx="92" cy="50" r="40" fill="url(#sf-heart-aura)"/>

  <!-- Hanger -->
  <g stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hook: stem → top arc → right side → inward curl -->
    <path d="M 42 50 L 42 28 C 42 20 50 16 58 16 C 66 16 70 22 70 30 C 70 38 64 40 60 36"/>
    <!-- Left shoulder -->
    <path d="M 42 50 L 18 82"/>
    <!-- Right shoulder -->
    <path d="M 42 50 L 66 82"/>
    <!-- Crossbar -->
    <path d="M 18 82 L 66 82"/>
  </g>

  <!-- Heart with bloom -->
  <path
    d="M 92 39 C 88 33 76 33 76 45 C 76 55 84 61 92 67 C 100 61 108 55 108 45 C 108 33 96 33 92 39 Z"
    fill="#FF2E47"
    filter="url(#sf-heart-bloom)"
  />
</svg>

<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="sfico-heart-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FF2E47" stop-opacity="0.7"/>
      <stop offset="45%"  stop-color="#FF2E47" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF2E47" stop-opacity="0"/>
    </radialGradient>
    <filter id="sfico-heart-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.7" result="b1"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black square background -->
  <rect width="100" height="100" fill="#0A0A0A"/>

  <!-- Heart aura behind everything (red glow) -->
  <circle cx="71" cy="52" r="32" fill="url(#sfico-heart-aura)"/>

  <!-- Hanger (scaled to fit left side of square) -->
  <g stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 32 52 L 32 34 C 32 27 38 23 45 23 C 52 23 55 28 55 34 C 55 40 51 41 48 39"/>
    <path d="M 32 52 L 14 76"/>
    <path d="M 32 52 L 50 76"/>
    <path d="M 14 76 L 50 76"/>
  </g>

  <!-- Heart with bloom -->
  <path
    d="M 71 44 C 68 39 60 39 60 49 C 60 57 65 62 71 67 C 77 62 82 57 82 49 C 82 39 74 39 71 44 Z"
    fill="#FF2E47"
    filter="url(#sfico-heart-bloom)"
  />
</svg>

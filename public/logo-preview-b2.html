<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option B – Wide Modern Heart</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0A0A0A;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  padding: 60px 32px;
}
h1 {
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #FF2E47;
}
.cards {
  display: flex;
  gap: 32px;
  align-items: flex-start;
}
.card {
  background: #111;
  border: 1.5px solid #222;
  border-radius: 24px;
  padding: 36px 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.card svg { width: 380px; height: auto; }
.card-name {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
}
.desc {
  font-size: 12px;
  color: #444;
  text-align: center;
  max-width: 300px;
  line-height: 1.6;
}
</style>
</head>
<body>

<h1>Option B — Wide Modern Heart, Pulled Close</h1>

<div class="cards">
  <div class="card">
    <svg viewBox="0 0 150 100" xmlns="http://www.w3.org/2000/svg" fill="none">
      <defs>
        <radialGradient id="aura-bmod" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#FF2E47" stop-opacity="0.85"/>
          <stop offset="44%"  stop-color="#FF2E47" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="#FF2E47" stop-opacity="0"/>
        </radialGradient>
        <filter id="bloom-bmod" x="-70%" y="-70%" width="240%" height="240%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Heart aura — centered on the new close heart position -->
      <circle cx="96" cy="56" r="34" fill="url(#aura-bmod)"/>

      <!-- Wide-shoulder hanger (same as Option B) -->
      <g stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <!-- Stem + hook loop -->
        <path d="M 38 50 L 38 28 C 38 20 47 12 55 14 C 63 16 66 25 63 31 C 60 37 54 37 51 34"/>
        <!-- Very wide shoulders -->
        <path d="M 38 50 L 4 82"/>
        <path d="M 38 50 L 72 82"/>
        <!-- Crossbar -->
        <path d="M 4 82 L 72 82"/>
      </g>

      <!--
        Wide modern heart — center (96, 55), pulled left so it nearly touches the hanger.
        Wide bumps (horizontal spread > vertical height) with rounder top lobes.
        Bottom tip is soft, not sharp.
      -->
      <path
        d="M 96 50
           C 92 41 76 42 76 53
           C 76 63 96 72 96 72
           C 96 72 116 63 116 53
           C 116 42 100 41 96 50
           Z"
        fill="#FF2E47"
        filter="url(#bloom-bmod)"
      />
    </svg>
    <div class="card-name">B2 — Wide Modern Heart, Close</div>
    <div class="desc">Wide-shoulder hanger · Heart pulled left, ~4px gap from crossbar · Wide oval heart shape with round top bumps</div>
  </div>
</div>

</body>
</html>
